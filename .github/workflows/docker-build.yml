name: Docker Build, Test & Publish

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["main"]

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  security-events: write

defaults:
  run:
    shell: bash

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/atechbroe-blog

jobs:

# ─────────────────────────────────────────────
# 1. Build & Test
# ─────────────────────────────────────────────
  build-and-test:

    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (load locally for testing)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: atechbroe-blog:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start test container
        run: |
          docker run -d \
            --name ghost-test \
            -p 2368:2368 \
            -e url=http://localhost:2368 \
            -e database__client=sqlite3 \
            -e database__connection__filename=/var/lib/ghost/content/data/ghost.db \
            atechbroe-blog:test

      - name: Wait for healthy status
        run: |
          echo "Waiting for Ghost..."
          for i in $(seq 1 30); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' ghost-test 2>/dev/null || echo "starting")
            echo "[$i/30] $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              exit 0
            fi
            sleep 5
          done
          echo "Container failed health check"
          docker logs ghost-test
          exit 1

      - name: Verify container user
        run: |
          USER=$(docker exec ghost-test whoami)
          echo "Running as: $USER"
          [ "$USER" = "node" ] || exit 1

      - name: Verify HTTP 200
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:2368/)
          echo "HTTP status: $CODE"
          [ "$CODE" = "200" ] || exit 1

      - name: Cleanup
        if: always()
        run: |
          docker stop ghost-test || true
          docker rm ghost-test || true


# ─────────────────────────────────────────────
# 2. Security Scan
# ─────────────────────────────────────────────
  security-scan:

    runs-on: ubuntu-latest
    needs: build-and-test
    continue-on-error: true

    steps:

      - uses: actions/checkout@v4

      - name: Build image for scanning
        run: docker build -t atechbroe-blog:scan .

      - name: Scan image vulnerabilities
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: atechbroe-blog:scan
          format: table
          exit-code: '0'
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          trivyignores: .trivyignore


# ─────────────────────────────────────────────
# 3. Publish to Docker Hub
# ─────────────────────────────────────────────
  publish:

    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push'

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=atechbroe-blog
            org.opencontainers.image.description=Ghost blog platform for atechbroe
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: true
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
name: Terraform — Deploy Ghost to EC2

on:
  push:
    branches: ["main", "dev"]
    paths: ["terraform/**"]
  pull_request:
    branches: ["main", "dev"]
    paths: ["terraform/**"]
  workflow_dispatch: 

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false # never cancel an in-progress apply

permissions:
  contents: read
  id-token: write  # required for OIDC AWS auth
  pull-requests: write # allows posting the plan as a PR comment

env:
  TF_VERSION: "1.7.5"
  TF_WORKING_DIR: terraform
  # Terraform variables — sourced from GitHub secrets
  TF_VAR_aws_region:    ${{ secrets.AWS_REGION }}
  TF_VAR_ghost_url:     ${{ secrets.GHOST_URL }}
  TF_VAR_ghost_image:   ${{ secrets.DOCKERHUB_USERNAME }}/atechbroe-blog:latest
  TF_VAR_environment:   production

jobs:

# ── 1. Validate & Plan ────────────────────────────────────────────────────────
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    outputs:
      plan_exit_code: ${{ steps.plan.outputs.exit_code }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ secrets.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        id: fmt
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.BACKEND_TF }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.DYNAMOTBALE_TF }}"

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan \
            -out=tfplan \
            -detailed-exitcode \
            -input=false 2>&1 | tee plan.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          retention-days: 1

      # Post plan diff as a PR comment
      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_WORKING_DIR }}/plan.txt', 'utf8');
            const maxLen = 65000;
            const truncated = plan.length > maxLen
              ? plan.slice(0, maxLen) + '\n\n... (truncated)'
              : plan;
            const fmtStatus = '${{ steps.fmt.outcome }}' === 'success' ? '✅' : '⚠️';
            const body = `## Terraform Plan
            **Format**: ${fmtStatus}

            <details><summary>Show Plan</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`
            </details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Fail if plan errored
        if: steps.plan.outputs.exit_code == '1'
        run: exit 1

# ── 2. Apply (main branch only) ───────────────────────────────────────────────
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: plan
    if: |
      github.event_name != 'pull_request' &&
      github.ref == 'refs/heads/main' &&
      needs.plan.outputs.plan_exit_code != '0'

    environment:
      name: production
      url: https://atechbroe.com

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ secrets.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.BACKEN_TF }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.DYNAMOTBALE_TF }}"

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve -input=false tfplan

      - name: Print outputs
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform output -no-color

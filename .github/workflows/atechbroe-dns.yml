name: DNS — Update shehujp.com

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:
    inputs:
      server_ip:
        description: "New server IP address. Leave blank to use the SERVER_IP secret."
        required: false
        type: string
      ttl:
        description: "DNS TTL in seconds (use 60 during migrations, 300 normally)"
        required: false
        default: "300"
        type: choice
        options: ["60", "300", "3600"]
      dry_run:
        description: "Dry run — show what would change without applying"
        required: false
        default: false
        type: boolean

# Never run two DNS updates concurrently
concurrency:
  group: dns-shehujp
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  update-dns:
    name: Update DNS Records
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Requires manual approval gate in the GitHub 'production' environment
    environment:
      name: production
      url: https://www.shehujp.com

    steps:
      - uses: actions/checkout@v4

      # ── 1. AWS auth ───────────────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # ── 2. Resolve and validate IP ───────────────────────────────────────────
      - name: Resolve and validate target IP
        id: ip
        run: |
          TARGET_IP="${{ inputs.server_ip }}"
          if [ -z "$TARGET_IP" ]; then
            TARGET_IP="${{ secrets.SERVER_IP }}"
          fi

          if [ -z "$TARGET_IP" ]; then
            echo "ERROR: No IP provided. Pass one via the input or set the SERVER_IP secret." >&2
            exit 1
          fi

          # Validate IPv4 format
          if ! echo "$TARGET_IP" | grep -qE '^([0-9]{1,3}\.){3}[0-9]{1,3}$'; then
            echo "ERROR: '$TARGET_IP' is not a valid IPv4 address." >&2
            exit 1
          fi

          # Validate each octet 0-255
          IFS='.' read -ra OCTETS <<< "$TARGET_IP"
          for octet in "${OCTETS[@]}"; do
            if [ "$octet" -gt 255 ]; then
              echo "ERROR: octet $octet is out of range." >&2
              exit 1
            fi
          done

          # Reject loopback / unspecified
          if [[ "$TARGET_IP" == "0.0.0.0" || "$TARGET_IP" == "127.0.0.1" ]]; then
            echo "ERROR: '$TARGET_IP' is not a valid public IP." >&2
            exit 1
          fi

          echo "ip=$TARGET_IP" >> "$GITHUB_OUTPUT"
          echo "Target IP validated: $TARGET_IP"

      # ── 3. Show current DNS state ─────────────────────────────────────────────
      - name: Show current DNS records
        run: |
          echo "=== Current Route 53 A records for shehujp.com ==="
          aws route53 list-resource-record-sets \
            --hosted-zone-id "${{ secrets.ROUTE53_ZONE_ID }}" \
            --query "ResourceRecordSets[?Type=='A']" \
            --output table

      # ── 4. Dry run ────────────────────────────────────────────────────────────
      - name: Dry run summary
        if: inputs.dry_run == true
        run: |
          echo "=== DRY RUN — no changes will be applied ==="
          echo ""
          echo "Would update:"
          echo "  shehujp.com     A → ${{ steps.ip.outputs.ip }}  TTL ${{ inputs.ttl }}"
          echo "  www.shehujp.com A → ${{ steps.ip.outputs.ip }}  TTL ${{ inputs.ttl }}"

      # ── 5. Apply ──────────────────────────────────────────────────────────────
      - name: Update Route 53 A records
        id: update
        if: inputs.dry_run != true
        env:
          ZONE_ID:   ${{ secrets.ROUTE53_ZONE_ID }}
          TARGET_IP: ${{ steps.ip.outputs.ip }}
          TTL:       ${{ inputs.ttl || '300' }}
        run: |
          CHANGE_BATCH=$(cat <<JSON
          {
            "Comment": "GitHub Actions run ${{ github.run_id }} by ${{ github.actor }}",
            "Changes": [
              {
                "Action": "UPSERT",
                "ResourceRecordSet": {
                  "Name": "shehujp.com",
                  "Type": "A",
                  "TTL": $TTL,
                  "ResourceRecords": [{ "Value": "$TARGET_IP" }]
                }
              },
              {
                "Action": "UPSERT",
                "ResourceRecordSet": {
                  "Name": "www.shehujp.com",
                  "Type": "A",
                  "TTL": $TTL,
                  "ResourceRecords": [{ "Value": "$TARGET_IP" }]
                }
              }
            ]
          }
          JSON
          )

          CHANGE_ID=$(aws route53 change-resource-record-sets \
            --hosted-zone-id "$ZONE_ID" \
            --change-batch "$CHANGE_BATCH" \
            --query 'ChangeInfo.Id' \
            --output text)

          echo "Change ID: $CHANGE_ID"
          echo "change_id=$CHANGE_ID" >> "$GITHUB_OUTPUT"

      # ── 6. Wait for Route 53 propagation ──────────────────────────────────────
      - name: Wait for propagation
        if: inputs.dry_run != true
        run: |
          echo "Waiting for Route 53 to propagate globally..."
          aws route53 wait resource-record-sets-changed \
            --id "${{ steps.update.outputs.change_id }}"
          echo "Route 53 propagation confirmed."

      # ── 7. Verify from public resolvers ──────────────────────────────────────
      - name: Verify DNS resolution
        if: inputs.dry_run != true
        run: |
          TARGET_IP="${{ steps.ip.outputs.ip }}"
          ALL_OK=true

          for resolver in "8.8.8.8" "1.1.1.1" "9.9.9.9"; do
            for host in "shehujp.com" "www.shehujp.com"; do
              RESOLVED=$(dig +short "$host" "@$resolver" A 2>/dev/null | head -1 || true)
              if [ "$RESOLVED" = "$TARGET_IP" ]; then
                echo "✅  [$resolver]  $host → $RESOLVED"
              else
                echo "⏳  [$resolver]  $host → ${RESOLVED:-<not yet>}  (still propagating)"
                ALL_OK=false
              fi
            done
          done

          echo ""
          if [ "$ALL_OK" = "true" ]; then
            echo "All resolvers confirmed: shehujp.com → $TARGET_IP"
          else
            TTL_MINS=$(( ${{ inputs.ttl || 300 }} / 60 ))
            echo "Propagation in progress — full global update can take up to ${TTL_MINS} minute(s)."
          fi

      # ── 8. Job summary ────────────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          MODE="Applied"
          [ "${{ inputs.dry_run }}" = "true" ] && MODE="Dry run (no changes)"
          {
            echo "## DNS Update — shehujp.com"
            echo ""
            echo "**Mode:** $MODE"
            echo ""
            echo "| Record | Type | Value | TTL |"
            echo "| --- | --- | --- | --- |"
            echo "| \`shehujp.com\` | A | \`${{ steps.ip.outputs.ip }}\` | ${{ inputs.ttl || 300 }}s |"
            echo "| \`www.shehujp.com\` | A | \`${{ steps.ip.outputs.ip }}\` | ${{ inputs.ttl || 300 }}s |"
            echo ""
            echo "**Triggered by:** @${{ github.actor }}"
          } >> "$GITHUB_STEP_SUMMARY"

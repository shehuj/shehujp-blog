name: Deploy вЂ” Rolling Restart Ghost on EC2

# Runs automatically after the Docker image is published to Docker Hub on main.
# Can also be triggered manually (e.g. after a hotfix, config change, or rollback).
#
# Pre-requisites (GitHub Secrets):
#   AWS_ACCESS_KEY_ID     вЂ” IAM user with ssm:SendCommand + ec2:DescribeInstances
#   AWS_SECRET_ACCESS_KEY вЂ” corresponding secret key
#   AWS_REGION            вЂ” e.g. us-east-1
#   GHOST_URL             вЂ” e.g. https://www.shehujp.com (used for health check)
#   DOCKERHUB_USERNAME    вЂ” used to resolve the full image name

on:
  workflow_run:
    workflows: ["Docker Build, Test & Publish"]
    types: [completed]
    branches: ["main"]
  workflow_dispatch:
    inputs:
      force:
        description: "Force restart even if no new image was published"
        required: false
        default: false
        type: boolean
      rollback_tag:
        description: "Image tag to deploy (leave blank for :latest). e.g. sha-abc1234 or 6.14.0"
        required: false
        default: ""
        type: string

# Never run two deploys at the same time
concurrency:
  group: deploy-ghost
  cancel-in-progress: false

permissions:
  contents: read

jobs:

  deploy:
    name: Rolling Restart
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Skip if triggered by a failed CI run (unless forced manually)
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    environment:
      name: production
      url: https://www.shehujp.com

    steps:

      # в”Ђв”Ђ 1. AWS auth в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # в”Ђв”Ђ 2. Resolve image tag в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      #    Default: :latest (set by publish job on main)
      #    Rollback: any tag passed via workflow_dispatch input
      - name: Resolve target image tag
        id: image
        run: |
          TAG="${{ inputs.rollback_tag }}"
          if [ -z "$TAG" ]; then
            TAG="latest"
          fi
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/shehujp-blog:${TAG}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "Target image: $IMAGE"

      # в”Ђв”Ђ 3. Find the running EC2 instance by tag в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Discover EC2 instance
        id: instance
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Environment,Values=production" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)

          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "ERROR: No running production EC2 instance found." >&2
            exit 1
          fi

          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"
          echo "Found instance: $INSTANCE_ID"

      # в”Ђв”Ђ 4. Deploy via SSM вЂ” mirrors CI test approach on production stack в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      #    On-instance steps (running as root via SSM):
      #      a) Update the image tag in the Ghost .env file
      #      b) Pull the new image explicitly (fails fast if tag missing)
      #      c) Rolling restart: bring up ghost only, no-deps, remove orphans
      #      d) HEALTHCHECK loop вЂ” mirrors CI "Wait for healthy status"
      #      e) Assert running user is node вЂ” mirrors CI "Verify container user"
      #      f) HTTP 200 on localhost:2368 вЂ” mirrors CI "Verify HTTP 200"
      #         (internal check; external check via GHOST_URL happens in step 6)
      - name: Build SSM deployment script
        id: script
        env:
          TARGET_IMAGE: ${{ steps.image.outputs.image }}
        run: |
          # Write the remote script to a file to avoid quoting hell
          cat > /tmp/deploy.sh << 'SCRIPT'
          set -euo pipefail

          IMAGE="__TARGET_IMAGE__"
          COMPOSE_FILE="/opt/ghost/docker-compose.yml"
          ENV_FILE="/opt/ghost/.env"

          echo "=== Deployment target: $IMAGE ==="

          # в”Ђв”Ђ a) Update GHOST_IMAGE in .env в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
          if [ -f "$ENV_FILE" ]; then
            if grep -q "^GHOST_IMAGE=" "$ENV_FILE"; then
              sed -i "s|^GHOST_IMAGE=.*|GHOST_IMAGE=$IMAGE|" "$ENV_FILE"
            else
              echo "GHOST_IMAGE=$IMAGE" >> "$ENV_FILE"
            fi
            echo "Updated GHOST_IMAGE in $ENV_FILE"
          else
            echo "WARNING: $ENV_FILE not found вЂ” systemd unit may hardcode the image." >&2
          fi

          # в”Ђв”Ђ b) Pull image в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
          echo "=== Pulling image ==="
          docker compose -f "$COMPOSE_FILE" pull ghost

          # в”Ђв”Ђ c) Rolling restart (ghost only, keep MySQL/Nginx running) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
          echo "=== Starting rolling restart ==="
          docker compose -f "$COMPOSE_FILE" up -d \
            --no-deps \
            --remove-orphans \
            ghost

          # в”Ђв”Ђ d) HEALTHCHECK loop (mirrors CI "Wait for healthy status") в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
          echo "=== Waiting for Ghost HEALTHCHECK ==="
          for i in $(seq 1 30); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' ghost 2>/dev/null || echo "starting")
            echo "[$i/30] $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "Ghost container is healthy."
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "ERROR: Ghost failed health check after 150 s" >&2
              docker logs --tail 50 ghost >&2
              exit 1
            fi
            sleep 5
          done

          # в”Ђв”Ђ e) Assert running user is node (mirrors CI "Verify container user") в”Ђ
          echo "=== Verifying container user ==="
          RUN_USER=$(docker exec ghost whoami 2>/dev/null || echo "unknown")
          echo "Container is running as: $RUN_USER"
          if [ "$RUN_USER" != "node" ]; then
            echo "ERROR: expected user 'node', got '$RUN_USER'" >&2
            exit 1
          fi

          # в”Ђв”Ђ f) HTTP 200 on Ghost direct port (mirrors CI "Verify HTTP 200") в”Ђв”Ђв”Ђ
          echo "=== Internal HTTP check on :2368 ==="
          for i in $(seq 1 6); do
            CODE=$(curl -sf -o /dev/null -w "%{http_code}" \
              --max-time 10 http://localhost:2368/ 2>/dev/null || echo "000")
            echo "[$i/6] HTTP $CODE"
            if [ "$CODE" = "200" ]; then
              echo "Ghost responding HTTP 200 on :2368."
              break
            fi
            if [ "$i" -eq 6 ]; then
              echo "ERROR: Ghost did not respond HTTP 200 on :2368" >&2
              exit 1
            fi
            sleep 5
          done

          # в”Ђв”Ђ Status summary в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
          echo ""
          echo "=== Stack status ==="
          docker compose -f "$COMPOSE_FILE" ps
          echo ""
          echo "=== Deployed image digest ==="
          docker inspect ghost --format='Image: {{.Config.Image}}  Digest: {{.Image}}'
          SCRIPT

          # Substitute the image placeholder (avoids heredoc escaping conflicts)
          sed -i "s|__TARGET_IMAGE__|${TARGET_IMAGE}|g" /tmp/deploy.sh

          # Base64-encode for clean SSM transport
          ENCODED=$(base64 -w0 /tmp/deploy.sh)
          echo "encoded=$ENCODED" >> "$GITHUB_OUTPUT"

      - name: Send deployment command via SSM
        id: ssm
        run: |
          # Decode on the remote side and execute вЂ” avoids all quoting issues
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ steps.instance.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[\"echo '${{ steps.script.outputs.encoded }}' | base64 -d | bash\"]" \
            --comment "GitHub Actions deploy run=${{ github.run_id }} actor=${{ github.actor }} image=${{ steps.image.outputs.tag }}" \
            --timeout-seconds 600 \
            --query "Command.CommandId" \
            --output text)

          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"
          echo "SSM command sent: $COMMAND_ID"

      # в”Ђв”Ђ 5. Wait for SSM command and surface output в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Wait for SSM command
        run: |
          aws ssm wait command-executed \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "${{ steps.instance.outputs.instance_id }}"

          STATUS=$(aws ssm get-command-invocation \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "${{ steps.instance.outputs.instance_id }}" \
            --query "Status" --output text)

          echo "SSM command status: $STATUS"
          [ "$STATUS" = "Success" ] || exit 1

      - name: Show SSM output
        if: always()
        run: |
          echo "=== STDOUT ==="
          aws ssm get-command-invocation \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "${{ steps.instance.outputs.instance_id }}" \
            --query "StandardOutputContent" --output text || true

          echo "=== STDERR ==="
          aws ssm get-command-invocation \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "${{ steps.instance.outputs.instance_id }}" \
            --query "StandardErrorContent" --output text || true

      # в”Ђв”Ђ 6. External health check вЂ” Ghost through Nginx/TLS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      #    This is the production equivalent of CI's localhost:2368 curl check.
      #    Validates the full stack: Ghost в†’ Nginx в†’ TLS в†’ public DNS в†’ HTTP 200
      - name: Wait for Ghost to become healthy (external via GHOST_URL)
        run: |
          echo "Checking ${{ secrets.GHOST_URL }} through Nginx/TLS..."
          for i in $(seq 1 24); do
            CODE=$(curl -sf -o /dev/null -w "%{http_code}" \
              --max-time 10 "${{ secrets.GHOST_URL }}/" 2>/dev/null || echo "000")
            echo "[$i/24] HTTP $CODE"
            [ "$CODE" = "200" ] && { echo "Ghost is healthy (external)."; exit 0; }
            sleep 10
          done
          echo "ERROR: Ghost did not respond HTTP 200 at ${{ secrets.GHOST_URL }} within 4 minutes." >&2
          exit 1

      # в”Ђв”Ђ 7. Job summary в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Write job summary
        if: always()
        run: |
          MODE="Rolling restart"
          [ -n "${{ inputs.rollback_tag }}" ] && MODE="Rollback to ${{ inputs.rollback_tag }}"
          {
            echo "## Deploy вЂ” Ghost Blog"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Mode | $MODE |"
            echo "| Image | \`${{ steps.image.outputs.image }}\` |"
            echo "| Instance | \`${{ steps.instance.outputs.instance_id }}\` |"
            echo "| URL | ${{ secrets.GHOST_URL }} |"
            echo "| Triggered by | @${{ github.actor }} |"
            echo "| Run | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
          } >> "$GITHUB_STEP_SUMMARY"

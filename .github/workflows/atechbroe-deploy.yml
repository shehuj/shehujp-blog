name: Deploy — Rolling Restart Ghost on EC2

# Runs automatically after the Docker image is published to Docker Hub on main.
# Can also be triggered manually (e.g. after a hotfix or config change).
#
# Pre-requisites (GitHub Secrets):
#   AWS_ACCESS_KEY_ID     — IAM user with ssm:SendCommand + ec2:DescribeInstances
#   AWS_SECRET_ACCESS_KEY — corresponding secret key
#   AWS_REGION            — e.g. us-east-1
#   GHOST_URL             — e.g. https://atechbroe.com (used for health check)

on:
  workflow_run:
    workflows: ["Docker Build, Test & Publish"]
    types: [completed]
    branches: ["main"]
  workflow_dispatch:
    inputs:
      force:
        description: "Force restart even if no new image was published"
        required: false
        default: false
        type: boolean

# Never run two deploys at the same time
concurrency:
  group: deploy-ghost
  cancel-in-progress: false

permissions:
  contents: read

jobs:

  deploy:
    name: Rolling Restart
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Skip if triggered by a failed CI run (unless forced manually)
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    environment:
      name: production
      url: https://atechbroe.com

    steps:

      # ── 1. AWS auth ───────────────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # ── 2. Find the running EC2 instance by tag ──────────────────────────────
      - name: Discover EC2 instance
        id: instance
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Environment,Values=production" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)

          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "ERROR: No running production EC2 instance found." >&2
            exit 1
          fi

          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"
          echo "Found instance: $INSTANCE_ID"

      # ── 3. Restart Ghost via SSM (pulls new image on start) ─────────────────
      #    The systemd ghost.service has ExecStartPre=docker compose pull,
      #    so restarting it automatically picks up the latest Docker Hub image.
      - name: Restart Ghost service via SSM
        id: ssm
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ steps.instance.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["systemctl restart ghost"]' \
            --comment "GitHub Actions deploy — run ${{ github.run_id }} by ${{ github.actor }}" \
            --query "Command.CommandId" \
            --output text)

          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"
          echo "SSM command sent: $COMMAND_ID"

      # ── 4. Wait for SSM command to complete ─────────────────────────────────
      - name: Wait for SSM command
        run: |
          aws ssm wait command-executed \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "${{ steps.instance.outputs.instance_id }}"

          STATUS=$(aws ssm get-command-invocation \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "${{ steps.instance.outputs.instance_id }}" \
            --query "Status" --output text)

          echo "SSM command status: $STATUS"
          [ "$STATUS" = "Success" ] || exit 1

      # ── 5. Health check — wait for Ghost to serve HTTP 200 ──────────────────
      - name: Wait for Ghost to become healthy
        run: |
          echo "Waiting for Ghost to come back up at ${{ secrets.GHOST_URL }}..."
          for i in $(seq 1 24); do
            CODE=$(curl -sf -o /dev/null -w "%{http_code}" \
              --max-time 10 "${{ secrets.GHOST_URL }}/" 2>/dev/null || echo "000")
            echo "[$i/24] HTTP $CODE"
            [ "$CODE" = "200" ] && { echo "Ghost is healthy."; exit 0; }
            sleep 10
          done
          echo "ERROR: Ghost did not respond HTTP 200 within 4 minutes." >&2
          exit 1

      # ── 6. Job summary ───────────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          {
            echo "## Deploy — Ghost Blog"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Instance | \`${{ steps.instance.outputs.instance_id }}\` |"
            echo "| URL | ${{ secrets.GHOST_URL }} |"
            echo "| Triggered by | @${{ github.actor }} |"
            echo "| Run | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
          } >> "$GITHUB_STEP_SUMMARY"

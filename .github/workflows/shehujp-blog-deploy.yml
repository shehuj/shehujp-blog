name: Deploy — Ghost on EC2

# ── Pipeline position ─────────────────────────────────────────────────────────
#   PR opened/updated  →  ghost-build publishes :dev
#                      →  THIS WORKFLOW deploys :dev  to dev  EC2
#   Merge to main      →  ghost-build publishes :latest
#                      →  THIS WORKFLOW deploys :latest to prod EC2
#
# Environment routing is automatic:
#   CI ran on a PR branch → target = dev,        image = :dev
#   CI ran on main        → target = production,  image = :latest
#
# Pre-requisites (GitHub Secrets):
#   AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY / AWS_REGION
#   GHOST_URL          — production public URL (used for prod external health check)
#   DOCKERHUB_USERNAME — Docker Hub username

on:
  workflow_run:
    workflows: ["Docker Build, Test & Publish"]
    types: [completed]
    # No branches filter — we handle dev vs prod routing inside the workflow.
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options: ["dev", "production"]
      rollback_tag:
        description: "Image tag to deploy (blank = environment default: :dev or :latest)"
        required: false
        default: ""
        type: string

# Separate concurrency groups per environment so dev and prod never block each other.
concurrency:
  group: deploy-ghost-${{ github.event.workflow_run.head_branch || inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:

# ── 1. Resolve — determine environment, image, and target instance ─────────────
  resolve:
    name: Resolve Target
    runs-on: ubuntu-latest

    # Skip deploys triggered by failed CI runs.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    outputs:
      environment: ${{ steps.target.outputs.environment }}
      image:       ${{ steps.target.outputs.image }}
      tag:         ${{ steps.target.outputs.tag }}

    steps:
      - name: Determine environment and image tag
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ inputs.environment }}"
          elif [ "${{ github.event.workflow_run.head_branch }}" = "main" ]; then
            ENV="production"
          else
            ENV="dev"
          fi

          # Explicit rollback tag overrides the environment default.
          if [ -n "${{ inputs.rollback_tag }}" ]; then
            TAG="${{ inputs.rollback_tag }}"
          elif [ "$ENV" = "production" ]; then
            TAG="latest"
          else
            TAG="dev"
          fi

          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/shehujp-blog:${TAG}"

          echo "environment=$ENV" >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE"     >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"

          echo "Environment : $ENV"
          echo "Image       : $IMAGE"

# ── 2. Deploy ──────────────────────────────────────────────────────────────────
#    Uses the GitHub environment gate:
#      dev        → no required reviewers (fast feedback loop)
#      production → requires manual approval
  deploy:
    name: Rolling Restart (${{ needs.resolve.outputs.environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: resolve

    environment:
      name: ${{ needs.resolve.outputs.environment }}
      url: ${{ needs.resolve.outputs.environment == 'production' && 'https://www.shehujp.com' || '' }}

    steps:

      # ── Auth ─────────────────────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # ── Discover EC2 instance ─────────────────────────────────────────────────
      - name: Discover EC2 instance
        id: instance
        run: |
          ENV="${{ needs.resolve.outputs.environment }}"

          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Environment,Values=${ENV}" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId | [0]" \
            --output text 2>/dev/null || true)

          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "Environment tag search returned nothing — trying Name tag fallback..."
            INSTANCE_ID=$(aws ec2 describe-instances \
              --filters \
                "Name=tag:Name,Values=ghost-blog-${ENV}" \
                "Name=instance-state-name,Values=running" \
              --query "Reservations[].Instances[].InstanceId | [0]" \
              --output text 2>/dev/null || true)
          fi

          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "::error::No running ${ENV} EC2 instance found."
            echo ""
            echo "--- All ghost-blog instances (any state) ---"
            aws ec2 describe-instances \
              --filters "Name=tag:Name,Values=ghost-blog-*" \
              --query "Reservations[].Instances[].[InstanceId,State.Name,Tags[?Key=='Name']|[0].Value]" \
              --output table || true
            echo ""
            echo "Run the Terraform infra workflow to provision the ${ENV} instance first."
            exit 1
          fi

          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"
          echo "Found instance: $INSTANCE_ID"

      # ── Build and encode the deploy script ───────────────────────────────────
      - name: Build SSM deployment script
        id: script
        env:
          TARGET_IMAGE: ${{ needs.resolve.outputs.image }}
        run: |
          cat > /tmp/deploy.sh << 'SCRIPT'
          set -euo pipefail

          IMAGE="__TARGET_IMAGE__"
          COMPOSE_FILE="/opt/ghost/docker-compose.yml"
          ENV_FILE="/opt/ghost/.env"

          echo "=== Deployment target: $IMAGE ==="

          # a) Update GHOST_IMAGE in .env
          if [ -f "$ENV_FILE" ]; then
            if grep -q "^GHOST_IMAGE=" "$ENV_FILE"; then
              sed -i "s|^GHOST_IMAGE=.*|GHOST_IMAGE=$IMAGE|" "$ENV_FILE"
            else
              echo "GHOST_IMAGE=$IMAGE" >> "$ENV_FILE"
            fi
            echo "Updated GHOST_IMAGE in $ENV_FILE"
          else
            echo "WARNING: $ENV_FILE not found — systemd unit may hardcode the image." >&2
          fi

          # b) Pull image (fail fast if tag is missing on Docker Hub)
          echo "=== Pulling image ==="
          docker compose -f "$COMPOSE_FILE" pull ghost

          # c) Rolling restart — ghost only, keep MySQL/Nginx running
          echo "=== Starting rolling restart ==="
          docker compose -f "$COMPOSE_FILE" up -d \
            --no-deps \
            --remove-orphans \
            ghost

          # d) HEALTHCHECK loop
          echo "=== Waiting for Ghost HEALTHCHECK ==="
          for i in $(seq 1 30); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' ghost 2>/dev/null || echo "starting")
            echo "[$i/30] $STATUS"
            if [ "$STATUS" = "healthy" ]; then echo "Ghost container is healthy."; break; fi
            if [ "$i" -eq 30 ]; then
              echo "ERROR: Ghost failed health check after 150s" >&2
              docker logs --tail 50 ghost >&2
              exit 1
            fi
            sleep 5
          done

          # e) Assert running user is node
          echo "=== Verifying container user ==="
          RUN_USER=$(docker exec ghost whoami 2>/dev/null || echo "unknown")
          echo "Container is running as: $RUN_USER"
          [ "$RUN_USER" = "node" ] || { echo "ERROR: expected 'node', got '$RUN_USER'" >&2; exit 1; }

          # f) Internal HTTP 200 check
          echo "=== Internal HTTP check on :2368 ==="
          for i in $(seq 1 6); do
            CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 10 http://localhost:2368/ 2>/dev/null || echo "000")
            echo "[$i/6] HTTP $CODE"
            if [ "$CODE" = "200" ]; then echo "Ghost responding HTTP 200 on :2368."; break; fi
            if [ "$i" -eq 6 ]; then echo "ERROR: Ghost did not respond HTTP 200 on :2368" >&2; exit 1; fi
            sleep 5
          done

          echo ""
          echo "=== Stack status ==="
          docker compose -f "$COMPOSE_FILE" ps
          echo ""
          echo "=== Deployed image digest ==="
          docker inspect ghost --format='Image: {{.Config.Image}}  Digest: {{.Image}}'
          SCRIPT

          sed -i "s|__TARGET_IMAGE__|${TARGET_IMAGE}|g" /tmp/deploy.sh
          ENCODED=$(base64 -w0 /tmp/deploy.sh)
          echo "encoded=$ENCODED" >> "$GITHUB_OUTPUT"

      # ── Send via SSM ─────────────────────────────────────────────────────────
      - name: Send deployment command via SSM
        id: ssm
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ steps.instance.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[\"echo '${{ steps.script.outputs.encoded }}' | base64 -d | bash\"]" \
            --comment "deploy run=${{ github.run_id }} env=${{ needs.resolve.outputs.environment }} image=${{ needs.resolve.outputs.tag }}" \
            --timeout-seconds 600 \
            --query "Command.CommandId" \
            --output text)

          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"
          echo "SSM command sent: $COMMAND_ID"

      - name: Wait for SSM command
        run: |
          aws ssm wait command-executed \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "${{ steps.instance.outputs.instance_id }}"

          STATUS=$(aws ssm get-command-invocation \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "${{ steps.instance.outputs.instance_id }}" \
            --query "Status" --output text)

          echo "SSM command status: $STATUS"
          [ "$STATUS" = "Success" ] || exit 1

      - name: Show SSM output
        if: always()
        run: |
          echo "=== STDOUT ==="
          aws ssm get-command-invocation \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "${{ steps.instance.outputs.instance_id }}" \
            --query "StandardOutputContent" --output text || true

          echo "=== STDERR ==="
          aws ssm get-command-invocation \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "${{ steps.instance.outputs.instance_id }}" \
            --query "StandardErrorContent" --output text || true

      # ── External health check (production only) ───────────────────────────────
      # Validates the full prod stack: Ghost → Nginx → ALB/TLS → public DNS
      - name: External health check (prod only)
        if: needs.resolve.outputs.environment == 'production'
        run: |
          echo "Checking ${{ secrets.GHOST_URL }} through Nginx/TLS..."
          for i in $(seq 1 24); do
            CODE=$(curl -sf -o /dev/null -w "%{http_code}" \
              --max-time 10 "${{ secrets.GHOST_URL }}/" 2>/dev/null || echo "000")
            echo "[$i/24] HTTP $CODE"
            [ "$CODE" = "200" ] && { echo "Ghost is healthy (external)."; exit 0; }
            sleep 10
          done
          echo "ERROR: Ghost did not respond HTTP 200 at ${{ secrets.GHOST_URL }} within 4 minutes." >&2
          exit 1

      # ── Summary ───────────────────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          ENV="${{ needs.resolve.outputs.environment }}"
          TAG="${{ needs.resolve.outputs.tag }}"
          MODE="Rolling restart"
          [ -n "${{ inputs.rollback_tag }}" ] && MODE="Rollback to ${{ inputs.rollback_tag }}"
          {
            echo "## Deploy — Ghost ($ENV)"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Environment | \`$ENV\` |"
            echo "| Mode | $MODE |"
            echo "| Image | \`${{ needs.resolve.outputs.image }}\` |"
            echo "| Instance | \`${{ steps.instance.outputs.instance_id }}\` |"
            echo "| Triggered by | @${{ github.actor }} |"
            echo "| Run | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
          } >> "$GITHUB_STEP_SUMMARY"
